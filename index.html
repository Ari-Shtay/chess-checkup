<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chess Checkup</title>
  <style>
    :root { --ink:#1a1a1a; --muted:#6b6b6b; --line:#e3e3e3; --bg:#fafafa; --accent:#2b6cb0; --warn:#b7791f; --good:#2f855a; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; color: var(--ink); background: var(--bg); max-width: 680px; margin: 2.5rem auto; padding: 0 1rem 3rem; line-height: 1.5; color-scheme: light; }
    h1 { margin-bottom: .25rem; }
    .tagline { color: var(--muted); margin-top: 0; }
    .controls { display: flex; gap: .5rem; margin: 1.25rem 0; }
    input { font-size: 1rem; padding: .5rem .6rem; flex: 1; border: 1px solid var(--line); border-radius: 6px; }
    button { font-size: 1rem; padding: .5rem 1rem; border: 0; border-radius: 6px; background: var(--ink); color: #fff; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    #status { color: var(--muted); font-size: .9rem; min-height: 1.2em; }

    .sample { color: var(--muted); font-size: .9rem; margin: 1rem 0 .5rem; }
    .card { border: 1px solid var(--line); border-radius: 10px; padding: 1.1rem 1.2rem; margin: .9rem 0; background: #fff; }
    .card.primary { border-color: var(--accent); border-left: 5px solid var(--accent); background: #f5f9ff; }
    .card.tie { border-color: var(--warn); border-left: 5px solid var(--warn); background: #fffaf0; }
    .card.refuse, .card.clean { border-left: 5px solid var(--muted); }
    .card h2 { margin: .2rem 0 .5rem; font-size: 1.25rem; }
    .card h3 { margin: .1rem 0 .5rem; font-size: 1rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
    .kicker { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); font-weight: 600; }
    .card.tie .kicker { color: var(--warn); }
    .conf { color: var(--muted); font-size: .9rem; margin-bottom: 0; }
    .card.rec .fix { font-weight: 600; }
    .lbl { color: var(--muted); font-weight: 600; }
    .freeflag { color: var(--good); font-size: .9rem; }
    .card a { color: var(--accent); text-decoration: none; }
    .card a:hover { text-decoration: underline; }
    details.more { margin-top: .5rem; }
    details.more summary { cursor: pointer; color: var(--muted); font-size: .9rem; }
    details.more p { font-size: .9rem; }

    .rest { margin-top: 1.4rem; }
    .rest h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .restrow { padding: .55rem 0; border-top: 1px solid var(--line); }
    .resthead { display: flex; justify-content: space-between; align-items: baseline; }
    .restname { font-weight: 600; }
    .restscore { font-variant-numeric: tabular-nums; color: var(--muted); font-size: .9rem; }
    .bar { height: 6px; background: var(--line); border-radius: 3px; margin: .35rem 0; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); }
    .restev { font-size: .9rem; margin: .2rem 0 0; }
    .muted { color: var(--muted); }

    .disclosure { color: var(--muted); font-size: .8rem; margin-top: 1.5rem; }
    .sitefoot { color: var(--muted); font-size: .85rem; border-top: 1px solid var(--line); margin-top: 1.5rem; padding-top: .9rem; }
  </style>
</head>
<body>
  <h1>Chess Checkup</h1>
  <p class="tagline">Enter your Lichess username. We read your analyzed rapid &amp; classical games and name the one weakness costing you the most rating — with the evidence and one honest fix.</p>
  <div class="controls">
    <input id="username" value="Ari_Ferrari_0" aria-label="Lichess username" placeholder="Lichess username">
    <button id="run">Run checkup</button>
  </div>
  <div id="status">Idle.</div>
  <div id="results"></div>

  <script type="module">
    import { Chess } from 'https://cdn.jsdelivr.net/npm/chess.js@1.4.0/+esm';

    // ==================================================================
    // CONFIG — every tunable pipeline constant lives here (spec section 3).
    // ==================================================================
    const CONFIG = {
      MAX_GAMES: 100,
      PERF_TYPES: 'rapid,classical',
      MIN_GAMES: 15,              // below this: refuse to diagnose

      // Win-probability conversion, copied (not recalled) from the Lichess
      // source on 2026-06-10: lichess-org/scalachess core/src/main/scala/eval.scala
      //   winningChances(cp) = 2 / (1 + exp(-0.00368208 * cp)) - 1, clamped [-1, 1]
      //   WinPercent = 50 + 50 * winningChances(cp), cp ceiled at +/-1000
      WIN_PERCENT_MULTIPLIER: -0.00368208,
      EVAL_CEILING_CP: 1000,      // Lichess caps cp here; mate scores map to +/-ceiling

      BLUNDER_SWING_CP: 200,      // eval swing against the mover
      SANITY_WINDOW_CP: 500,      // ignore swings when |eval before move| beyond this
      EQUALISH_CP: 200,           // "roughly equal" band for tactics metric A
      MISSED_WIN_GAIN_CP: 250,    // best move gains this much over the move played

      WINNING_CP: 300,            // "winning position" threshold (user POV)
      WINNING_SUSTAIN_PLIES: 2,   // must hold for this many consecutive plies

      ENDGAME_NONPAWN_POINTS: 13, // Q=9 R=5 B/N=3; endgame if both sides <= this, or queens off
      ENDGAME_GOOD_ENTRY_CP: 200, // "entered the endgame clearly better"

      OPENING_EXIT_PLY: 24,       // move 12

      DISASTER_EVAL_CP: -100,     // opening family repeatedly at/below this at exit
      DISASTER_MIN_COUNT: 3,

      LOW_TIME_SECONDS: 20,
      LOW_TIME_FRACTION: 0.10,    // of starting time
      SNAP_MOVE_SECONDS: 10,      // less thought than this on a non-forced move
    };

    // ==================================================================
    // SCORE — tunable severity-scoring + ranking constants (spec section 3,
    // model from the session-2 design panel; see scoring-model.md).
    // ==================================================================
    const SCORE = {
      // band weights — tactics highest by default (spec §3); shallow spread so
      // weights only break genuine near-ties, never predetermine the winner.
      BAND: { cat1: 1.00, cat2: 0.80, cat3: 0.85, cat4: 0.75, cat5: 0.80 },
      // sample-size confidence factor (labels: <15 refuse, 15-30 low, 31-60 med, >60 high)
      CONF: { low: 0.55, medium: 0.80, high: 1.00 },

      CAT1_EQ_REF: 0.60, CAT1_MW_REF: 0.70, CAT1_EQ_W: 0.6, CAT1_MW_W: 0.4,
      CAT2_GAP_REF: 25, CAT2_SPOIL_REF: 0.50, CAT2_GAP_W: 0.6, CAT2_SPOIL_W: 0.4, CAT2_MIN_ENTRIES: 4,
      CAT3_Z_REF: 1.5, CAT3_MIN_WIN: 8,
      CAT4_DISASTER_SHARE_REF: 0.40, CAT4_SCATTER_REF: 20, CAT4_SCATTER_MIN_GAMES: 30, CAT4_SCATTER_GPF_FLOOR: 4, CAT4_C_DISCOUNT: 0.85,
      CAT5_TL_REF: 0.30, CAT5_LT_REF: 0.40, CAT5_SNAP_REF: 0.40, CAT5_TL_W: 0.34, CAT5_LT_W: 0.33, CAT5_SN_W: 0.33, CAT5_MIN_LOSSES: 5,

      // "specific beats generic" — additive severity bonuses (survive band+confidence)
      SPEC_CAT4_MAX: 0.20, SPEC_CAT5_MAX: 0.10, SPEC_SNAP_GATE: 0.30,

      TIE: 0.15,            // top scores within 15% of the leader are co-leaders
      NO_LEAK_FLOOR: 0.12,  // leader below this => "no single leak stands out"
    };

    const clamp = (x, lo, hi) => Math.min(hi, Math.max(lo, x));
    const clamp01 = x => clamp(x, 0, 1);
    // shared bounded, monotone, unit-agnostic severity map: ~0.63 at x = ref
    const sat = (x, ref) => x <= 0 ? 0 : clamp01(1 - Math.exp(-x / ref));
    // Win-probability (kept for later; session-2 scoring uses raw cp per spec).
    const winPercent = cp =>
      50 + 50 * clamp(2 / (1 + Math.exp(CONFIG.WIN_PERCENT_MULTIPLIER * clamp(cp, -CONFIG.EVAL_CEILING_CP, CONFIG.EVAL_CEILING_CP))) - 1, -1, 1);

    // ==================================================================
    // Fetch (spec section 3). Response shape verified 2026-06-10 — see data-notes.md.
    // ==================================================================
    async function fetchGames(username) {
      const params = new URLSearchParams({
        max: CONFIG.MAX_GAMES, rated: true, perfType: CONFIG.PERF_TYPES,
        analysed: true, evals: true, clocks: true, opening: true, sort: 'dateDesc',
      });
      const res = await fetch(`https://lichess.org/api/games/user/${encodeURIComponent(username)}?${params}`,
        { headers: { Accept: 'application/x-ndjson' } });
      if (res.status === 404) throw new Error(`No Lichess account found for "${username}".`);
      if (!res.ok) throw new Error(`Lichess API ${res.status} ${res.statusText}`);
      const text = await res.text();
      return text.split('\n').filter(Boolean).map(line => JSON.parse(line));
    }

    // ==================================================================
    // Per-game analysis (unchanged from session 1)
    // ==================================================================
    function analyzeGame(g, userId) {
      const color =
        g.players.white.user?.id === userId ? 'w' :
        g.players.black.user?.id === userId ? 'b' : null;
      const moves = (g.moves || '').split(' ').filter(Boolean);
      if (!color || !g.analysis || moves.length === 0) return null;

      const userIsWhite = color === 'w';
      const result = !g.winner ? 'draw' : (g.winner === 'white') === userIsWhite ? 'win' : 'loss';

      // Eval after each ply, white POV, capped. Mate -> signed ceiling.
      const evalAfter = moves.map((_, i) => {
        const e = g.analysis[i];
        if (!e) return null;
        if (typeof e.eval === 'number') return clamp(e.eval, -CONFIG.EVAL_CEILING_CP, CONFIG.EVAL_CEILING_CP);
        if (typeof e.mate === 'number') return e.mate > 0 ? CONFIG.EVAL_CEILING_CP : -CONFIG.EVAL_CEILING_CP;
        return null;
      });
      const evalBefore = i => i === 0 ? 0 : evalAfter[i - 1];

      // Clock: centiseconds; clocks[i] = mover's remaining time after ply i.
      const initialCs = (g.clock?.initial ?? 0) * 100;
      const incrementCs = (g.clock?.increment ?? 0) * 100;
      const clockAfter = i => g.clocks?.[i] ?? null;
      const clockBefore = i => i >= 2 ? clockAfter(i - 2) : (initialCs || null);
      const timeSpentCs = i => {
        const before = clockBefore(i), after = clockAfter(i);
        return before == null || after == null ? null : Math.max(0, before - after + incrementCs);
      };

      // Replay with chess.js: phase of the position the mover faced, + legal-move count.
      const phaseBefore = [];
      const legalMovesBefore = [];
      const chess = new Chess();
      let replayBroke = null;
      for (let i = 0; i < moves.length; i++) {
        const board = chess.board();
        let qW = 0, qB = 0, ptsW = 0, ptsB = 0;
        const pts = { n: 3, b: 3, r: 5, q: 9 };
        for (const row of board) for (const sq of row) {
          if (!sq || sq.type === 'p' || sq.type === 'k') continue;
          if (sq.color === 'w') ptsW += pts[sq.type]; else ptsB += pts[sq.type];
          if (sq.type === 'q') sq.color === 'w' ? qW++ : qB++;
        }
        const endgame = (qW === 0 && qB === 0) ||
          (ptsW <= CONFIG.ENDGAME_NONPAWN_POINTS && ptsB <= CONFIG.ENDGAME_NONPAWN_POINTS);
        phaseBefore.push(endgame ? 'endgame' : i < CONFIG.OPENING_EXIT_PLY ? 'opening' : 'middlegame');
        legalMovesBefore.push(chess.moves().length);
        try { chess.move(moves[i]); }
        catch (err) { replayBroke = `ply ${i}: ${moves[i]}`; break; }
      }

      const sign = userIsWhite ? 1 : -1;
      const userPlies = [];
      for (let i = userIsWhite ? 0 : 1; i < moves.length; i += 2) {
        const before = evalBefore(i), after = evalAfter[i];
        if (before == null || after == null) continue;
        const swing = sign * before - sign * after; // cp lost by the user on this move
        userPlies.push({
          ply: i, swing, cpl: Math.max(0, swing),
          evalBeforeWhitePov: before,
          inSanityWindow: Math.abs(before) <= CONFIG.SANITY_WINDOW_CP,
          equalish: Math.abs(before) <= CONFIG.EQUALISH_CP,
          phase: phaseBefore[i] ?? null,
          legalMoves: legalMovesBefore[i] ?? null,
          remainingBeforeCs: clockBefore(i),
          spentCs: timeSpentCs(i),
        });
      }

      const isBlunder = p => p.inSanityWindow && p.swing >= CONFIG.BLUNDER_SWING_CP;

      const povEvals = evalAfter.map(e => e == null ? null : sign * e);
      let reachedWinning = false;
      for (let i = 0; i + CONFIG.WINNING_SUSTAIN_PLIES - 1 < povEvals.length; i++) {
        let ok = true;
        for (let k = 0; k < CONFIG.WINNING_SUSTAIN_PLIES; k++) {
          if (povEvals[i + k] == null || povEvals[i + k] < CONFIG.WINNING_CP) { ok = false; break; }
        }
        if (ok) { reachedWinning = true; break; }
      }

      const entryPly = phaseBefore.findIndex(ph => ph === 'endgame');
      const endgameEntryEvalPov = entryPly >= 0 && evalBefore(entryPly) != null ? sign * evalBefore(entryPly) : null;

      const exitIdx = Math.min(CONFIG.OPENING_EXIT_PLY, moves.length) - 1;
      let openingExitEvalPov = null;
      for (let i = exitIdx; i >= 0; i--) if (evalAfter[i] != null) { openingExitEvalPov = sign * evalAfter[i]; break; }
      const openingFamily = (g.opening?.name || 'Unknown').split(':')[0].trim();

      return {
        id: g.id, speed: g.speed, result, status: g.status,
        rating: g.players[userIsWhite ? 'white' : 'black'].rating,
        lichessAcpl: g.players[userIsWhite ? 'white' : 'black'].analysis?.acpl ?? null,
        userPlies, isBlunder, replayBroke,
        reachedWinning, endgameEntryEvalPov,
        openingFamily, openingExitEvalPov, initialCs,
      };
    }

    // ==================================================================
    // Aggregate the five category metrics (spec section 3) (unchanged from session 1)
    // ==================================================================
    function aggregate(records) {
      const n = records.length;
      const all = records.flatMap(r => r.userPlies.map(p => ({ ...p, rec: r })));
      const blunders = all.filter(p => p.rec.isBlunder(p));
      const avg = xs => xs.length ? xs.reduce((a, b) => a + b, 0) / xs.length : null;

      const equalBlunders = blunders.filter(p => p.equalish);
      const missedWins = all.filter(p => p.inSanityWindow && p.swing >= CONFIG.MISSED_WIN_GAIN_CP);

      const egPlies = all.filter(p => p.phase === 'endgame');
      const mgPlies = all.filter(p => p.phase === 'middlegame');
      const egAcpl = avg(egPlies.map(p => p.cpl));
      const mgAcpl = avg(mgPlies.map(p => p.cpl));
      const goodEntries = records.filter(r => r.endgameEntryEvalPov != null && r.endgameEntryEvalPov >= CONFIG.ENDGAME_GOOD_ENTRY_CP);
      const goodEntriesSpoiled = goodEntries.filter(r => r.result !== 'win');

      const winningGames = records.filter(r => r.reachedWinning);
      const notConverted = winningGames.filter(r => r.result !== 'win');

      const families = {};
      for (const r of records) {
        (families[r.openingFamily] ??= { games: 0, exitEvals: [] }).games++;
        if (r.openingExitEvalPov != null) families[r.openingFamily].exitEvals.push(r.openingExitEvalPov);
      }
      const familyRows = Object.entries(families)
        .map(([name, f]) => ({
          family: name, games: f.games,
          avgExitEvalCp: avg(f.exitEvals) != null ? Math.round(avg(f.exitEvals)) : null,
          disasters: f.exitEvals.filter(e => e <= CONFIG.DISASTER_EVAL_CP).length,
        }))
        .sort((a, b) => b.games - a.games);
      const recurringDisasters = familyRows.filter(f => f.disasters >= CONFIG.DISASTER_MIN_COUNT);

      const losses = records.filter(r => r.result === 'loss');
      const timeLosses = losses.filter(r => r.status === 'outoftime');
      const lowTime = p => p.remainingBeforeCs != null &&
        (p.remainingBeforeCs < CONFIG.LOW_TIME_SECONDS * 100 ||
         (p.rec.initialCs > 0 && p.remainingBeforeCs < CONFIG.LOW_TIME_FRACTION * p.rec.initialCs));
      const lowTimeBlunders = blunders.filter(lowTime);
      const snapBlunders = blunders.filter(p =>
        p.spentCs != null && p.spentCs < CONFIG.SNAP_MOVE_SECONDS * 100 &&
        p.legalMoves != null && p.legalMoves > 1);

      const acplDiffs = records
        .filter(r => r.lichessAcpl != null && r.userPlies.length > 0)
        .map(r => Math.abs(avg(r.userPlies.map(p => p.cpl)) - r.lichessAcpl));

      const sortedRatings = records.map(r => r.rating).sort((a, b) => a - b);
      const ratingMedian = sortedRatings[Math.floor((sortedRatings.length - 1) / 2)];

      return {
        n,
        speeds: records.reduce((m, r) => (m[r.speed] = (m[r.speed] ?? 0) + 1, m), {}),
        results: records.reduce((m, r) => (m[r.result] = (m[r.result] ?? 0) + 1, m), {}),
        ratingMin: Math.min(...records.map(r => r.rating)),
        ratingMax: Math.max(...records.map(r => r.rating)),
        ratingMedian,
        replayBroken: records.filter(r => r.replayBroke).length,
        acplSanityMeanAbsDiff: avg(acplDiffs),
        cat1: {
          equalPositionBlundersPerGame: equalBlunders.length / n,
          equalPositionBlundersTotal: equalBlunders.length,
          missedWinsPerGame: missedWins.length / n,
          missedWinsTotal: missedWins.length,
          blundersTotalAnyPosition: blunders.length,
        },
        cat2: {
          endgameAcpl: egAcpl, middlegameAcpl: mgAcpl,
          endgameVsMiddlegameGapCp: egAcpl != null && mgAcpl != null ? egAcpl - mgAcpl : null,
          endgamePlies: egPlies.length, middlegamePlies: mgPlies.length,
          goodEndgameEntries: goodEntries.length,
          goodEntriesNotWon: goodEntriesSpoiled.length,
        },
        cat3: {
          gamesReachedWinning: winningGames.length,
          winningNotWon: notConverted.length,
          conversionFailureShare: winningGames.length ? notConverted.length / winningGames.length : null,
        },
        cat4: {
          distinctFamilies: familyRows.length,
          familyRows, recurringDisasters,
        },
        cat5: {
          losses: losses.length,
          lossesOnTime: timeLosses.length,
          lossesOnTimeShare: losses.length ? timeLosses.length / losses.length : null,
          blundersTotal: blunders.length,
          lowTimeBlunders: lowTimeBlunders.length,
          lowTimeBlunderShare: blunders.length ? lowTimeBlunders.length / blunders.length : null,
          snapBlunders: snapBlunders.length,
        },
      };
    }

    // ==================================================================
    // SCORE + RANK (spec section 3). Returns the data contract the render
    // layer consumes. See scoring-model.md for the reasoning behind each step.
    // ==================================================================
    function confidenceLabel(n) {
      if (n < CONFIG.MIN_GAMES) return null;   // refuse
      if (n <= 30) return 'low';
      if (n <= 60) return 'medium';
      return 'high';
    }

    function score(agg) {
      const S = SCORE;
      const clabel = confidenceLabel(agg.n);
      if (!clabel) return { mode: 'refuse', n: agg.n, clabel: null };
      const cf = S.CONF[clabel];
      const c1 = agg.cat1, c2 = agg.cat2, c3 = agg.cat3, c4 = agg.cat4, c5 = agg.cat5;

      // cat1 TACTICS — two per-game rates, blended 60/40
      const raw1 = S.CAT1_EQ_W * sat(c1.equalPositionBlundersPerGame, S.CAT1_EQ_REF)
                 + S.CAT1_MW_W * sat(c1.missedWinsPerGame, S.CAT1_MW_REF);

      // cat2 ENDGAME — only a POSITIVE phase gap is a leak; spoil term sample-trust-shrunk
      const gapTerm = sat(Math.max(0, c2.endgameVsMiddlegameGapCp ?? 0), S.CAT2_GAP_REF);
      const spoilTerm = c2.goodEndgameEntries > 0
        ? sat(c2.goodEntriesNotWon / c2.goodEndgameEntries, S.CAT2_SPOIL_REF) * clamp01(c2.goodEndgameEntries / S.CAT2_MIN_ENTRIES)
        : 0;
      const raw2 = S.CAT2_GAP_W * gapTerm + S.CAT2_SPOIL_W * spoilTerm;

      // cat4 OPENINGS base — worst recurring-disaster family (by share), or scatter
      let worstShare = 0, worstFamily = null;
      for (const f of c4.recurringDisasters) {
        const share = f.games > 0 ? f.disasters / f.games : 0;
        if (share > worstShare) { worstShare = share; worstFamily = f; }
      }
      const sigB = sat(worstShare, S.CAT4_DISASTER_SHARE_REF);
      const gpf = agg.n / Math.max(1, c4.distinctFamilies);
      const sigC = gpf < S.CAT4_SCATTER_GPF_FLOOR
        ? sat(c4.distinctFamilies, S.CAT4_SCATTER_REF) * clamp01(agg.n / S.CAT4_SCATTER_MIN_GAMES)
        : 0;
      const raw4base = Math.max(sigB, S.CAT4_C_DISCOUNT * sigC);
      const scatterDriven = (S.CAT4_C_DISCOUNT * sigC) > sigB;

      // cat5 TIME base — three shares, roughly equal weight
      let tl = sat(c5.lossesOnTimeShare ?? 0, S.CAT5_TL_REF);
      if (c5.losses < S.CAT5_MIN_LOSSES) tl *= c5.losses / S.CAT5_MIN_LOSSES; // noisy on few losses
      const lt = sat(c5.lowTimeBlunderShare ?? 0, S.CAT5_LT_REF);
      const snapShare = c5.blundersTotal > 0 ? c5.snapBlunders / c5.blundersTotal : 0;
      const sn = sat(snapShare, S.CAT5_SNAP_REF);
      const raw5base = S.CAT5_TL_W * tl + S.CAT5_LT_W * lt + S.CAT5_SN_W * sn;

      // cat3 CONVERSION — RELATIVE only, computed LAST against the user's own base raws
      const peers = [raw1, raw2, raw4base, raw5base];
      const peerMean = peers.reduce((a, b) => a + b, 0) / peers.length;
      const peerSD = Math.sqrt(peers.reduce((a, b) => a + (b - peerMean) ** 2, 0) / peers.length);
      let z = null, raw3 = 0;
      if (c3.conversionFailureShare != null && c3.gamesReachedWinning >= S.CAT3_MIN_WIN) {
        z = (c3.conversionFailureShare - peerMean) / Math.max(peerSD, 1e-9);
        raw3 = z > 0 ? sat(z, S.CAT3_Z_REF) : 0;
      }

      // "specific beats generic" — additive bonuses on the base raws
      const raw4 = clamp01(raw4base + (worstFamily ? S.SPEC_CAT4_MAX * sat(worstShare, S.CAT4_DISASTER_SHARE_REF) : 0));
      const snapBonusOn = snapShare >= S.SPEC_SNAP_GATE;
      const raw5 = clamp01(raw5base + (snapBonusOn ? S.SPEC_CAT5_MAX * sat(snapShare, S.CAT5_SNAP_REF) : 0));

      const raws = { cat1: raw1, cat2: raw2, cat3: raw3, cat4: raw4, cat5: raw5 };
      const scores = {};
      for (const k of ['cat1', 'cat2', 'cat3', 'cat4', 'cat5']) scores[k] = raws[k] * S.BAND[k] * cf;
      const ranked = Object.entries(scores).map(([cat, sc]) => ({ cat, score: sc })).sort((a, b) => b.score - a.score);

      const lead = ranked[0];
      let mode, coLeaders = [lead];
      if (lead.score === 0 || lead.score < S.NO_LEAK_FLOOR) {
        mode = 'clean';
      } else {
        coLeaders = ranked.filter(s => s.score > 0 && (lead.score - s.score) / lead.score <= S.TIE);
        mode = coLeaders.length >= 2 ? 'tie' : 'single';
      }

      return {
        mode, n: agg.n, clabel, cf, raws, scores, ranked,
        primary: lead.cat, coLeaders,
        detail: { worstFamily, worstShare, snapShare, snapBonusOn, z, peerMean, peerSD, scatterDriven },
      };
    }

    // ==================================================================
    // Category metadata, evidence sentences, resource database (spec §4/§5)
    // ==================================================================
    const CATS = {
      cat1: { name: 'Tactical safety' },
      cat2: { name: 'Endgame technique' },
      cat3: { name: 'Holding a winning position' },
      cat4: { name: 'Opening reliability' },
      cat5: { name: 'Time & decision process' },
    };

    // Evidence sentence per category — names the SPECIFIC finding when present.
    function evidence(cat, agg, detail) {
      const a = agg;
      if (cat === 'cat1') {
        return `you lost 200+ centipawns in a single move ${a.cat1.equalPositionBlundersPerGame.toFixed(1)} times per game in roughly equal positions (${a.cat1.equalPositionBlundersTotal} such blunders across ${a.n} games), and missed a clearly winning move ${a.cat1.missedWinsPerGame.toFixed(1)} times per game`;
      }
      if (cat === 'cat2') {
        const gap = a.cat2.endgameVsMiddlegameGapCp;
        const parts = [];
        if (gap != null && gap > 0) parts.push(`your average centipawn loss climbs from ${Math.round(a.cat2.middlegameAcpl)} in the middlegame to ${Math.round(a.cat2.endgameAcpl)} in the endgame (a +${Math.round(gap)}-centipawn gap)`);
        if (a.cat2.goodEndgameEntries > 0 && a.cat2.goodEntriesNotWon > 0) parts.push(`${a.cat2.goodEntriesNotWon} of the ${a.cat2.goodEndgameEntries} endgames you entered clearly ahead slipped away`);
        return parts.length ? parts.join(', and ') : `your endgame accuracy is roughly in line with the rest of your game`;
      }
      if (cat === 'cat3') {
        const won = a.cat3.gamesReachedWinning - a.cat3.winningNotWon;
        return `you reached a clearly winning position in ${a.cat3.gamesReachedWinning} games and only won ${won} of them — failing to convert ${Math.round(a.cat3.conversionFailureShare * 100)}% of won positions, noticeably worse than your error rate everywhere else`;
      }
      if (cat === 'cat4') {
        const f = detail.worstFamily;
        if (f && !detail.scatterDriven) return `your ${f.family} fell apart by move 12 in ${f.disasters} of the ${f.games} games you played it (reaching −100 centipawns or worse) — the same opening failing the same way`;
        return `you spread ${a.n} games across ${a.cat4.distinctFamilies} different opening families and never built depth in any one of them`;
      }
      if (cat === 'cat5') {
        const snapPct = a.cat5.blundersTotal ? Math.round(a.cat5.snapBlunders / a.cat5.blundersTotal * 100) : 0;
        const bits = [`${snapPct}% of your blunders (${a.cat5.snapBlunders} of ${a.cat5.blundersTotal}) came on snap moves you played in under 10 seconds`];
        if (a.cat5.losses > 0) bits.push(`${a.cat5.lossesOnTime} of your ${a.cat5.losses} losses were on the clock`);
        bits.push(`${a.cat5.lowTimeBlunders} blunders came with under 20 seconds left`);
        return bits.join(', ');
      }
    }

    // Recommendation per category (spec §4). Free is shown first whenever honestly best.
    function recommendation(cat, agg, sc) {
      const d = sc.detail;
      const cat5AlsoHigh = sc.scores.cat5 >= SCORE.NO_LEAK_FLOOR;
      const cat3AlsoHigh = sc.scores.cat3 >= SCORE.NO_LEAK_FLOOR;
      if (cat === 'cat1') return {
        fix: 'A structured Lichess puzzle protocol — 20 minutes a day, mixed themes, every puzzle solved slowly and fully before you move, and no streak-chasing.',
        why: 'At your level single-move tactical errors are the biggest rating sink, and deliberate slow solving rebuilds the habit of checking every move before you commit to it.',
        free: true,
        link: { label: 'Start on Lichess puzzles (free)', url: 'https://lichess.org/training' },
        options: [
          { label: 'The Woodpecker Method', note: 'Smith & Tikkanen, Quality Chess 2018 — 1,100+ exercises solved in repeated, faster cycles. ~$27–32. A genuine workload; the free protocol above already covers most players.', url: 'https://www.amazon.com/s?k=Woodpecker+Method+Axel+Smith+Tikkanen' },
          { label: '1001 Brilliant Ways to Checkmate (Reinfeld)', note: 'Cheap, battle-tested budget option if you prefer a book.', url: 'https://www.amazon.com/s?k=Reinfeld+1001+Brilliant+Ways+to+Checkmate' },
        ],
      };
      if (cat === 'cat2') return {
        fix: "Silman's Complete Endgame Course.",
        why: "It's organized by rating class, so you read the chapter for your level and stop — which maps one-to-one onto how this tool diagnoses you. Paperback or Kindle.",
        free: false,
        link: { label: "Silman's Complete Endgame Course", url: 'https://www.amazon.com/s?k=Silman+Complete+Endgame+Course' },
        options: agg.ratingMedian >= 1500 ? [
          { label: '100 Endgames You Must Know', note: 'de la Villa, New in Chess — excellent, but the author frames it as second-phase study, so use it after Silman, not before. A Chessable course version exists if you prefer spaced repetition.', url: 'https://www.amazon.com/s?k=100+Endgames+You+Must+Know+de+la+Villa' },
        ] : [],
      };
      if (cat === 'cat3') return {
        fix: "A process habit, no purchase needed: the moment you realize you're winning, slow down for one full minute, ask what the opponent's only tricks are, trade pieces (not pawns), and stop hunting for brilliancies.",
        why: 'Won positions get lost to haste and over-ambition, not missing knowledge — a deliberate slow-down is what converts them.',
        free: true,
        link: null,
        options: [
          { label: 'A Guide to Chess Improvement (Best of Novice Nook)', note: `Heisman, Everyman — explicitly covers prioritizing to maintain won positions${cat5AlsoHigh ? ', and it double-serves your time-management leak, so one book covers both' : ''}. Optional only — the free habit above is the real fix.`, url: 'https://www.amazon.com/s?k=Heisman+Guide+to+Chess+Improvement+Novice+Nook' },
        ],
      };
      if (cat === 'cat4') {
        const f = d.worstFamily;
        if (f && !d.scatterDriven) return {
          fix: `Don't overhaul your openings — fix the one that keeps failing. Pick a single reliable line in the ${f.family} and drill just that, using a free Chessable Short & Sweet course (10–30 annotated lines, often with video).`,
          why: `The leak is specific: the ${f.family} collapsed in ${f.disasters} of the ${f.games} games you played it. One narrow repertoire fix removes most of the damage — there's no need to study openings broadly.`,
          free: true,
          link: { label: `Free Short & Sweet for the ${f.family}`, url: `https://www.chessable.com/courses/?q=${encodeURIComponent(f.family + ' short and sweet')}` },
          options: [],
        };
        return {
          fix: 'Study openings less, not more: pick one weapon for each color and stick to it. Try a free Chessable Short & Sweet for your most-played first move before committing to anything.',
          why: `You're spread across ${agg.cat4.distinctFamilies} opening families with no real depth in any of them — consolidating onto fewer lines fixes more than any single book.`,
          free: true,
          link: { label: 'Browse free Short & Sweet courses', url: 'https://www.chessable.com/courses/?q=short+and+sweet' },
          options: [
            { label: 'Discovering Chess Openings', note: 'Emms, Everyman 2006, ~$15 — teaches development, the center, and king safety as principles instead of memorized lines. Good precisely because it talks you out of cramming theory.', url: 'https://www.amazon.com/s?k=Discovering+Chess+Openings+Emms' },
          ],
        };
      }
      if (cat === 'cat5') return {
        fix: 'A process habit, no purchase needed: budget your clock by phase, run a one-line blunder check before every move (what does this move leave undefended? what is their check, capture, or threat?), and after every time-loss review where the time actually went.',
        why: 'Most of these losses are habit, not knowledge — a fixed pre-move check and clock discipline are what stop the snap blunders and the flag-falls.',
        free: true,
        link: null,
        options: [
          { label: 'A Guide to Chess Improvement (Best of Novice Nook)', note: `Heisman, Everyman — time management is one of its core subjects${cat3AlsoHigh ? ', and it double-serves your conversion leak, so one book covers both' : ''}. Optional only — the free habit above is the real fix.`, url: 'https://www.amazon.com/s?k=Heisman+Guide+to+Chess+Improvement+Novice+Nook' },
        ],
      };
    }

    // ==================================================================
    // Render — real HTML cards (spec section 5)
    // ==================================================================
    const esc = s => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const barHTML = s => `<div class="bar"><div class="bar-fill" style="width:${Math.round(clamp01(s) * 100)}%"></div></div>`;

    function diagnosisCardHTML(cat, agg, sc) {
      return `<article class="card primary">
        <div class="kicker">Primary diagnosis</div>
        <h2>Your number one leak: ${esc(CATS[cat].name)}.</h2>
        <p>In your last ${agg.n} analyzed games, ${esc(evidence(cat, agg, sc.detail))}. Players in your range usually gain more rating fixing this than anything else.</p>
        <p class="conf">Confidence: <strong>${esc(sc.clabel)}</strong> based on ${agg.n} games.</p>
      </article>`;
    }

    function recCardHTML(cat, agg, sc) {
      const r = recommendation(cat, agg, sc);
      let html = `<article class="card rec"><h3>The fix</h3><p class="fix">${esc(r.fix)}</p>`;
      html += `<p><span class="lbl">Why this one:</span> ${esc(r.why)}</p>`;
      if (r.free) html += `<p class="freeflag">This fix is free — shown first because it's honestly the best path for most players.</p>`;
      if (r.link) html += `<p><a href="${esc(r.link.url)}" target="_blank" rel="noopener">${esc(r.link.label)} ↗</a></p>`;
      if (r.options && r.options.length) {
        html += `<details class="more"><summary>${r.free ? 'Optional — only if you want a bigger commitment' : 'Also worth knowing'}</summary>`;
        for (const o of r.options) html += `<p><a href="${esc(o.url)}" target="_blank" rel="noopener">${esc(o.label)} ↗</a> — ${esc(o.note)}</p>`;
        html += `</details>`;
      }
      return html + `</article>`;
    }

    function rankedRemainderHTML(agg, sc, excludeCats) {
      const rows = sc.ranked.filter(r => !excludeCats.includes(r.cat));
      let html = `<section class="rest"><h3>The rest, ranked</h3>`;
      for (const r of rows) {
        const flagged = r.score >= SCORE.NO_LEAK_FLOOR; // below the leak floor => not a real signal

        html += `<div class="restrow"><div class="resthead"><span class="restname">${esc(CATS[r.cat].name)}</span><span class="restscore">${r.score.toFixed(2)}</span></div>${barHTML(r.score)}`;
        html += flagged
          ? `<p class="restev">${esc(evidence(r.cat, agg, sc.detail))}.</p>`
          : `<p class="restev muted">No meaningful signal here — not a leak for you.</p>`;
        html += `</div>`;
      }
      return html + `</section>`;
    }

    function refusalCardHTML(n) {
      return `<article class="card refuse">
        <h2>Not enough analyzed games to diagnose you honestly.</h2>
        <p>We found ${n} analyzed rapid or classical game${n === 1 ? '' : 's'} — we need at least ${CONFIG.MIN_GAMES} before we'll say anything you can trust.</p>
        <p>Here's how to get more: open your recent games on Lichess and click <em>Request a computer analysis</em> on the ones that don't have it yet (it's under the board, or in the game's menu). Each analyzed game becomes data this tool can read. Then run the checkup again.</p>
        <p class="freeflag">We'd rather say “not enough data” than guess.</p>
      </article>`;
    }

    function cleanCardHTML(agg) {
      return `<article class="card clean">
        <h2>No single leak stands out.</h2>
        <p>Across your last ${agg.n} analyzed games, none of the five areas scored high enough to call out as <em>the</em> thing costing you rating — either your weaknesses are spread evenly or you're simply playing cleanly. That's a good problem to have.</p>
        <p>The ranked breakdown below shows where you're relatively weakest anyway.</p>
      </article>`;
    }

    const disclosureHTML = () => `<p class="disclosure">Small print: this early version only reads games that already have Lichess computer analysis, which can skew toward more interesting or important games. Treat the diagnosis as a strong hint, not a verdict — a later version will analyze your unanalyzed games too.</p>`;
    const footerHTML = () => `<footer class="sitefoot">Recommendations are never sponsored. If we ever add affiliate links, we'll say so right here.</footer>`;

    function sampleLine(username, agg) {
      const speedStr = Object.keys(agg.speeds || {}).length ? Object.entries(agg.speeds).map(([k, v]) => `${v} ${k}`).join(', ') : 'no games';
      const ratingStr = agg.n ? `, rated ${agg.ratingMin}–${agg.ratingMax}` : '';
      return `<div class="sample">Chess Checkup for <strong>${esc(username)}</strong> — ${agg.n} analyzed game${agg.n === 1 ? '' : 's'} (${speedStr})${ratingStr}.</div>`;
    }

    function renderResult(username, agg, sc) {
      const root = document.getElementById('results');
      let html = sampleLine(username, agg);

      if (sc.mode === 'refuse') { root.innerHTML = html + refusalCardHTML(agg.n) + footerHTML(); return; }
      if (sc.mode === 'clean') { root.innerHTML = html + cleanCardHTML(agg) + rankedRemainderHTML(agg, sc, []) + disclosureHTML() + footerHTML(); return; }

      if (sc.mode === 'single') {
        const cat = sc.primary;
        html += diagnosisCardHTML(cat, agg, sc);
        html += recCardHTML(cat, agg, sc);
        html += rankedRemainderHTML(agg, sc, [cat]);
      } else { // tie
        const cats = sc.coLeaders.map(c => c.cat);
        html += `<article class="card tie"><div class="kicker">No clear single leak</div>
          <h2>${cats.length === 2 ? 'Two leaks are running neck and neck.' : 'Several leaks are running neck and neck.'}</h2>
          <p>${cats.map(c => esc(CATS[c].name)).join(' and ')} scored within a hair of each other — the data doesn't cleanly separate them, so here's the honest version: each one, with its evidence and a fix.</p>
          <p class="conf">Confidence: <strong>${esc(sc.clabel)}</strong> based on ${agg.n} games.</p></article>`;
        for (const c of sc.coLeaders) {
          html += `<article class="card sub"><h2>${esc(CATS[c.cat].name)}</h2><p>In your last ${agg.n} analyzed games, ${esc(evidence(c.cat, agg, sc.detail))}.</p></article>`;
          html += recCardHTML(c.cat, agg, sc);
        }
        html += rankedRemainderHTML(agg, sc, cats);
      }
      root.innerHTML = html + disclosureHTML() + footerHTML();
    }

    // ==================================================================
    // Console report (debug trace, retained from session 1)
    // ==================================================================
    const pct = x => x == null ? 'n/a' : (100 * x).toFixed(0) + '%';
    const num = (x, d = 2) => x == null ? 'n/a' : x.toFixed(d);

    function report(username, a, sc) {
      console.log(`\n=== CHESS CHECKUP — ${username} — ${a.n} analyzed rated games ===`);
      console.log(`Sample: ${JSON.stringify(a.speeds)} | results: ${JSON.stringify(a.results)} | rating ${a.ratingMin}–${a.ratingMax}`);
      console.log(`Pipeline sanity: mean |our ACPL − Lichess acpl| = ${num(a.acplSanityMeanAbsDiff, 1)} cp` +
        (a.replayBroken ? ` | WARNING: ${a.replayBroken} games failed move replay` : ''));
      if (sc && sc.mode !== 'refuse') {
        console.log(`\nMODE: ${sc.mode} | confidence: ${sc.clabel} (factor ${sc.cf})`);
        console.table(sc.ranked.map(r => ({ category: CATS[r.cat].name, raw: +sc.raws[r.cat].toFixed(4), score: +r.score.toFixed(4) })));
        if (sc.detail.worstFamily) console.log(`Named opening leak: ${sc.detail.worstFamily.family} (${sc.detail.worstFamily.disasters}/${sc.detail.worstFamily.games})`);
        console.log(`cat3 relative z-score: ${num(sc.detail.z, 2)} (peer mean ${num(sc.detail.peerMean, 3)}, sd ${num(sc.detail.peerSD, 3)})`);
      }
      console.log(`=== end ===`);
    }

    // ==================================================================
    // Wiring
    // ==================================================================
    const statusEl = document.getElementById('status');
    const runBtn = document.getElementById('run');
    const setStatus = s => { statusEl.textContent = s; };

    async function run() {
      const username = document.getElementById('username').value.trim();
      const results = document.getElementById('results');
      if (!username) return setStatus('Enter a Lichess username.');
      runBtn.disabled = true;
      results.innerHTML = '';
      try {
        setStatus(`Fetching up to ${CONFIG.MAX_GAMES} analyzed rapid/classical games for ${username}…`);
        const games = await fetchGames(username);
        setStatus(`Fetched ${games.length} games. Replaying & scoring…`);
        const userId = username.toLowerCase();
        const records = games.map(g => analyzeGame(g, userId)).filter(Boolean);

        if (records.length === 0) {
          renderResult(username, { n: 0, speeds: {} }, { mode: 'refuse', n: 0, clabel: null });
          setStatus(`No usable analyzed games found for ${username}.`);
          return;
        }
        const agg = aggregate(records);
        const sc = score(agg);
        report(username, agg, sc);
        renderResult(username, agg, sc);
        setStatus(`Done — ${records.length} analyzed games. Diagnosis below (full trace in the console).`);
      } catch (err) {
        console.error(err);
        setStatus(`Error: ${err.message}`);
      } finally {
        runBtn.disabled = false;
      }
    }

    runBtn.addEventListener('click', run);
    document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
    run(); // auto-run for testing
  </script>
</body>
</html>
